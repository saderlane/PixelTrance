name: Create GitHub Release

on: [push]

env:
  jar_path: 'build/libs/*.jar'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mod_name: ${{ steps.gradle_props.outputs.mod_name }}
      minecraft_version: ${{ steps.gradle_props.outputs.minecraft_version }}
      mod_version: ${{ steps.gradle_props.outputs.mod_version }}
      jar_name: ${{ steps.rename_jar.outputs.jar_name }}
      commit_message: ${{ steps.commit_msg.outputs.message }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle Wrapper Executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build

      - name: Read gradle.properties
        id: gradle_props
        run: |
          mod_name=$(grep '^mod_name=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          mod_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "mod_name=$mod_name" >> $GITHUB_OUTPUT
          echo "minecraft_version=$minecraft_version" >> $GITHUB_OUTPUT
          echo "mod_version=$mod_version" >> $GITHUB_OUTPUT

      - name: Rename JAR Artifact
        id: rename_jar
        run: |
          new_name="${{ steps.gradle_props.outputs.mod_name }}-${{ steps.gradle_props.outputs.minecraft_version }}-neoforge-${{ steps.gradle_props.outputs.mod_version }}.jar"
          src=$(ls build/libs/*.jar | grep -v 'sources\|javadoc' | head -n 1)
          cp "$src" "build/libs/$new_name"
          echo "jar_name=$new_name" >> $GITHUB_OUTPUT

      - name: Get Commit Message
        id: commit_msg
        run: |
          msg=$(git log -1 --pretty=%B)
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$msg" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload JAR as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/${{ steps.rename_jar.outputs.jar_name }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.gradle_props.outputs.mod_name }}-${{ steps.gradle_props.outputs.minecraft_version }}-neoforge-${{ steps.gradle_props.outputs.mod_version }}"
          gh release create "$tag" \
            "build/libs/${{ steps.rename_jar.outputs.jar_name }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="$tag" \
            --notes="${{ steps.commit_msg.outputs.message }}"

  publish-curseforge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: build/libs/

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CF_PROJECT_ID }}
          curseforge-token: ${{ secrets.PUBLISH_CURSEFORGE_TOKEN }}

          name: ${{ needs.build.outputs.mod_name }}-${{ needs.build.outputs.minecraft_version }}-neoforge-${{ needs.build.outputs.mod_version }}
          version: ${{ needs.build.outputs.mod_version }}
          version-type: release
          changelog: ${{ needs.build.outputs.commit_message }}

          files: build/libs/${{ needs.build.outputs.jar_name }}
          loaders: neoforge
          game-versions: ${{ needs.build.outputs.minecraft_version }}