name: Create GitHub Release

on: [push]

env:
  jar_path: 'build/libs/*.jar'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Read gradle.properties
        id: gradle_props
        run: |
          mod_name=$(grep '^mod_name=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          minecraft_version=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          mod_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "mod_name=$mod_name" >> $GITHUB_OUTPUT
          echo "minecraft_version=$minecraft_version" >> $GITHUB_OUTPUT
          echo "mod_version=$mod_version" >> $GITHUB_OUTPUT

      - name: Rename JAR artifact
        id: rename_jar
        run: |
          mod_name="${{ steps.gradle_props.outputs.mod_name }}"
          minecraft_version="${{ steps.gradle_props.outputs.minecraft_version }}"
          mod_version="${{ steps.gradle_props.outputs.mod_version }}"
          new_name="${mod_name}-${minecraft_version}-${mod_version}.jar"
          src=$(ls build/libs/*.jar | grep -v 'sources\|javadoc' | head -n 1)
          cp "$src" "build/libs/$new_name"
          echo "jar_name=$new_name" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit_msg
        run: |
          msg=$(git log -1 --pretty=%B)
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$msg" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
            

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.gradle_props.outputs.mod_name }}-${{ steps.gradle_props.outputs.minecraft_version }}-${{ steps.gradle_props.outputs.mod_version }}"
          gh release create "$tag" \
            "build/libs/${{ steps.rename_jar.outputs.jar_name }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="$tag" \
            --notes="${{ steps.commit_msg.outputs.message }}"
